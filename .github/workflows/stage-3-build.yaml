name: "Stage 3: Build"

on:
  workflow_call:
    inputs:
      version:
        description: "Version to build (overrides detection)"
        required: false
        type: string
      new_release_published:
        description: "Whether a new release was published by the release stage"
        required: false
        type: boolean
        default: false
      pr_number:
        description: "PR number for pre-release build (e.g. '42' → tag 'pr-42'). Empty = not a PR build."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.pr_number }}" ]]; then
            VERSION="pr-${{ inputs.pr_number }}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=gateway-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: ./scripts/bash/package_release.sh "${{ runner.temp }}/dist" "${{ steps.version.outputs.version }}"

      - name: Read tool versions
        id: tool-versions
        run: |
          echo "python=$(awk '/^python / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "uv=$(awk '/^uv / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.tool-versions.outputs.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: ${{ steps.tool-versions.outputs.uv }}
          enable-cache: true

      - name: Smoke test
        run: |
          WORK_DIR="${{ runner.temp }}/smoke-test"
          mkdir -p "$WORK_DIR"
          unzip "${{ runner.temp }}/dist/${{ steps.version.outputs.artifact_name }}" -d "$WORK_DIR"
          cd "$WORK_DIR"
          uv sync --frozen --no-dev
          PYTHONPATH=src uv run python -c "
          import pacs_main
          import mwl_main
          import upload_main
          import relay_listener
          print('All service modules imported successfully')
          "

      - name: Create or Update Release
        if: github.ref_type == 'tag' || inputs.new_release_published || inputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ inputs.pr_number != '' }}
        run: |
          PRERELEASE_FLAG=""
          [[ "$IS_PRERELEASE" == "true" ]] && PRERELEASE_FLAG="--prerelease"

          # Pre-releases are recreated on every push so the git tag always points
          # to the current commit (raw.githubusercontent.com uses the tag as a ref).
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || true
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            $PRERELEASE_FLAG \
            --generate-notes \
            2>/dev/null || echo "Release already exists, uploading assets..."

          # Upload or overwrite assets
          gh release upload "$VERSION" \
            ${{ runner.temp }}/dist/gateway-*.zip \
            ${{ runner.temp }}/dist/gateway-*.zip.sha256 \
            --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gateway-package
          path: |
            ${{ runner.temp }}/dist/gateway-*.zip
            ${{ runner.temp }}/dist/gateway-*.zip.sha256
          retention-days: 90

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/dist/${{ steps.version.outputs.artifact_name }}
